version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      test:
        patterns:
          - "vitest"
          - "@vitest/*"
      lsp:
        patterns:
          - "vscode-*"
      runtime:
        patterns:
          - "typebox"
          - "iconv-lite"
      tree-sitter:
        patterns:
          - "tree-sitter"
          - "tree-sitter-*"
    ignore:
      # tree-sitter core is pinned at 0.22.4; must NOT upgrade alone.
      # Grammars 0.24.x/0.25.x require tree-sitter core 0.25.x (breaking API).
      # Ignore 0.24.x and 0.25.x; allow 0.26.x+ to trigger re-evaluation PRs.
      - dependency-name: "tree-sitter"
        versions: [">=0.23.0"]
      - dependency-name: "tree-sitter-*"
        versions: [">=0.24.0, <0.26.0"]
