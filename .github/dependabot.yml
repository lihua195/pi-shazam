version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      test:
        patterns:
          - "vitest"
          - "@vitest/*"
      lsp:
        patterns:
          - "vscode-*"
      runtime:
        patterns:
          - "typebox"
          - "iconv-lite"
      tree-sitter:
        patterns:
          - "tree-sitter"
          - "tree-sitter-*"
    ignore:
      # tree-sitter core is pinned at 0.22.4; grammars >=0.24.x require
      # tree-sitter core 0.25.x (breaking API changes). Coordinate ALL
      # grammar upgrades together when upgrading tree-sitter core.
      - dependency-name: "tree-sitter"
        versions: [">=0.23.0"]
      - dependency-name: "tree-sitter-*"
        versions: [">=0.24.0"]
